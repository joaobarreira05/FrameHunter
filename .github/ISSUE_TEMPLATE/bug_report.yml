name: Bug Report
description: Report a defect or regression in FrameHunter
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise bug description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Exact commands and inputs used
      placeholder: |
        1. Run command ...
        2. Use image ... and video ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g. v0.1.0 or commit hash

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version
